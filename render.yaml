services:
  - type: web
    name: nfse-system
    runtime: python
    region: oregon
    plan: starter
    buildCommand: "pip install -r backend/requirements.txt && cd frontend && npm install && npm run build"
    startCommand: "gunicorn backend.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --preload"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nfse-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: NODE_VERSION
        value: "20"

databases:
  - name: nfse-db
    plan: free
    region: oregon
