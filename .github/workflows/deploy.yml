name: Deploy to VPS

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/atrio/nfse-system
            git pull origin master || git pull origin main
            cd /opt/atrio
            docker compose up -d --build nfse-system
            echo "Deploy nfse-system concluido"
